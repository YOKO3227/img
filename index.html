<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 경로 매칭기- Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .tree-item { border-left: 2px solid #e2e8f0; margin-left: 1rem; padding-left: 1rem; }
        .folder-toggle { cursor: pointer; user-select: none; }
        .folder-toggle:hover { color: #2563eb; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
        .hidden { display: none; }
        .rule-row { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .preview-image { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: contain; background: #eee; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 mb-2">이미지 경로 매칭기 Pro</h1>
                <p class="text-slate-500 font-medium">실시간 이미지 미리보기 기능 ㅠㅗ함!</p>
            </div>
            <div class="text-xs text-slate-400 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100 font-bold">
                TIP: 기초 URL에 {v1}, {v2} 처럼 중괄호를 꼭 포함해 주세요.
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="card p-5 border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                        매칭 설정
                    </h2>
                    
                    <div class="mb-6">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">기초 URL 템플릿</label>
                        <input type="text" id="baseUrl" placeholder="https://example.com/img/{v1}/{v2}.jpg" 
                            class="w-full p-3 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm transition-all font-mono">
                    </div>
                    
                    <div id="variableContainer" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></div>

                    <button onclick="addVariableField()" id="addBtn" class="w-full mt-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-sm font-semibold transition-all border border-slate-200">
                        + 새로운 변수 추가
                    </button>
                    
                    <button onclick="generateUrls()" class="w-full mt-3 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all shadow-lg active:scale-[0.98] flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        경로 생성 및 이미지 매칭
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="resultSection" class="hidden card overflow-hidden flex flex-col h-full min-h-[700px] border border-slate-200">
                    <div class="flex border-b border-slate-200 bg-slate-50">
                        <button onclick="switchTab('tree')" id="tab-tree" class="flex-1 py-4 text-sm font-bold tab-active transition-all">이미지 갤러리/트리</button>
                        <button onclick="switchTab('raw')" id="tab-raw" class="flex-1 py-4 text-sm font-bold text-slate-400 hover:bg-white transition-all">URL 텍스트 목록</button>
                    </div>

                    <div class="p-6 flex-1 overflow-y-auto bg-white">
                        <div id="view-tree">
                            <div class="mb-4 flex justify-between items-center">
                                <div class="flex gap-2">
                                    <button onclick="toggleAllFolders(false)" class="text-[11px] font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200">전체 접기</button>
                                    <button onclick="toggleAllFolders(true)" class="text-[11px] font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200">전체 펼치기</button>
                                </div>
                                <div class="flex items-center gap-2">
                                    <input type="checkbox" id="autoLoadImages" class="w-4 h-4 text-indigo-600 rounded">
                                    <label for="autoLoadImages" class="text-xs font-bold text-slate-500">이미지 자동 로드</label>
                                </div>
                            </div>
                            <div id="treeContainer" class="space-y-1"></div>
                        </div>

                        <div id="view-raw" class="hidden">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-xs text-slate-400 font-medium font-bold">복사하여 엑셀이나 메모장에 붙여넣으세요.</span>
                                <button onclick="copyToClipboard()" class="text-xs bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 active:scale-95 transition-all">전체 복사하기</button>
                            </div>
                            <textarea id="resultOutput" readonly class="w-full h-[550px] p-5 bg-slate-50 border border-slate-200 rounded-xl font-mono text-[11px] leading-relaxed outline-none focus:border-indigo-300"></textarea>
                        </div>
                    </div>
                    
                    <div class="bg-indigo-50 border-t border-indigo-100 p-4 px-6 flex justify-between items-center">
                        <span class="text-sm font-bold text-indigo-900 italic">총 생성된 이미지 경로</span>
                        <span id="resultCount" class="bg-indigo-600 text-white px-5 py-1 rounded-full text-sm font-black">0</span>
                    </div>
                </div>
                
                <div id="emptyPlaceholder" class="card h-full min-h-[700px] flex flex-col items-center justify-center text-slate-400 p-10 text-center border-2 border-dashed border-slate-200 bg-slate-50/50 shadow-none">
                    <div class="p-6 bg-white rounded-full shadow-sm mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    </div>
                    <p class="text-lg font-bold text-slate-400 italic">왼쪽에서 기초 URL과 변수를 설정한 후 버튼을 눌러주세요.</p>
                    <p class="text-sm text-slate-400 mt-2">결과 화면에서 이미지를 바로 확인할 수 있습니다.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 이미지 미리보기 모달 (필요시) -->
    <div id="imageModal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modalImg" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        const maxVars = 10;

        function onVariableNameChange(input) {
            input.dataset.auto = 'false';
            const newName = input.value.trim();
            if (newName === "") return;
            const group = input.closest('.var-group');
            group.querySelectorAll('.rule-parent-display').forEach(el => el.textContent = newName);
            updateAllOptionSelectors();
            input.dataset.prevValue = newName;
        }

        function updateVarNumbers() {
            const groups = document.querySelectorAll('.var-group');
            groups.forEach((group, index) => {
                const newNum = index + 1;
                const nameInput = group.querySelector('.var-name');
                const label = group.querySelector('.var-label');
                if (nameInput.dataset.auto === "true") {
                    nameInput.value = `v${newNum}`;
                    nameInput.dataset.prevValue = `v${newNum}`;
                }
                label.textContent = `변수 ${newNum}`;
                group.querySelectorAll('.rule-parent-display').forEach(el => el.textContent = nameInput.value);
            });
            updateAllOptionSelectors();
        }

        function updateAllOptionSelectors() {
            const allVarNames = Array.from(document.querySelectorAll('.var-name')).map(input => input.value);
            const selectors = document.querySelectorAll('.rule-target-select');
            selectors.forEach(sel => {
                const currentVal = sel.value;
                const currentParentVar = sel.closest('.var-group').querySelector('.var-name').value;
                sel.innerHTML = '';
                allVarNames.forEach(name => {
                    if (name !== currentParentVar) {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.textContent = name;
                        sel.appendChild(opt);
                    }
                });
                if (allVarNames.includes(currentVal)) sel.value = currentVal;
            });
        }

        function addVariableField() {
            const container = document.getElementById('variableContainer');
            const currentCount = container.children.length;
            if (currentCount >= maxVars) return;

            const nextNum = currentCount + 1;
            const defaultName = `v${nextNum}`;
            const div = document.createElement('div');
            div.className = 'var-group p-4 bg-white border border-slate-200 rounded-2xl shadow-sm relative transition-all hover:border-blue-200';
            div.innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <span class="var-label text-[10px] font-black text-slate-400 uppercase bg-slate-100 px-2 py-0.5 rounded">변수 ${nextNum}</span>
                        <input type="text" class="var-name font-black text-sm text-blue-600 bg-transparent border-none focus:ring-0 w-24 p-0" 
                               value="${defaultName}" data-auto="true" data-prev-value="${defaultName}" oninput="onVariableNameChange(this)">
                    </div>
                    <button onclick="this.closest('.var-group').remove(); updateVarNumbers(); updateAddButton();" class="text-slate-300 hover:text-red-500 transition-colors p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <input type="text" class="var-values w-full p-2.5 border border-slate-200 rounded-xl text-sm mb-3 focus:border-blue-400 outline-none" placeholder="매칭 데이터 입력 (예: A, B, 01-10)">
                
                <div class="pt-2 border-t border-slate-100">
                    <button onclick="toggleOptions(this)" class="text-[11px] font-bold text-slate-500 flex items-center gap-1 hover:text-indigo-600 transition-all">
                        <svg class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        제한 옵션 설정 (IF)
                    </button>
                    <div class="options-panel hidden mt-3 space-y-2">
                        <div class="rules-list space-y-2"></div>
                        <button onclick="addRule(this)" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-lg text-[10px] font-bold text-slate-400 hover:border-indigo-300 hover:text-indigo-500 transition-all">
                            + 새로운 제한 규칙 추가
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(div);
            updateAddButton();
            updateAllOptionSelectors();
        }

        function toggleOptions(btn) {
            const panel = btn.nextElementSibling;
            const icon = btn.querySelector('svg');
            const isHidden = panel.classList.toggle('hidden');
            icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function addRule(btn) {
            const list = btn.previousElementSibling;
            const parentVar = btn.closest('.var-group').querySelector('.var-name').value;
            const div = document.createElement('div');
            div.className = 'rule-row p-3 bg-slate-50 rounded-xl border border-slate-100 flex flex-wrap items-center gap-2 text-[11px]';
            const allVarNames = Array.from(document.querySelectorAll('.var-name')).map(input => input.value);
            const targetOptions = allVarNames.filter(n => n !== parentVar).map(n => `<option value="${n}">${n}</option>`).join('');
            div.innerHTML = `
                <div class="flex items-center gap-1.5 w-full md:w-auto">
                    <span class="font-bold text-slate-400 italic underline">IF</span>
                    <span class="rule-parent-display font-bold text-slate-700">${parentVar}</span>
                    <span class="font-bold text-slate-700">이</span>
                    <input type="text" class="rule-trigger-val p-1 border rounded w-24 text-center outline-none focus:border-blue-400" placeholder="값(A,B)/범위">
                    <span class="font-bold text-slate-700">일 때,</span>
                </div>
                <div class="flex items-center gap-1.5 w-full md:w-auto">
                    <select class="rule-target-select p-1 border rounded font-bold text-blue-600 bg-white">
                        ${targetOptions}
                    </select>
                    <span class="font-bold text-slate-700">의</span>
                    <input type="text" class="rule-affected-vals p-1 border rounded w-24 outline-none focus:border-blue-400" placeholder="값/범위">
                    <select class="rule-type p-1 border rounded font-bold bg-white">
                        <option value="exclude">제외</option>
                        <option value="only">만 선택</option>
                    </select>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 hover:text-red-500 ml-auto">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 000 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            `;
            list.appendChild(div);
        }

        function updateAddButton() {
            const currentCount = document.getElementById('variableContainer').children.length;
            document.getElementById('addBtn').disabled = currentCount >= maxVars;
        }

        function parseRange(input) {
            if (!input) return [];
            const parts = input.split(',').map(s => s.trim()).filter(s => s !== "");
            let results = [];
            parts.forEach(part => {
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(s => s.trim());
                    if (start && end) results = results.concat(expandRange(start, end));
                    else results.push(part);
                } else results.push(part);
            });
            return [...new Set(results)];
        }

        function expandRange(start, end) {
            const isNumeric = (str) => /^\d+$/.test(str);
            if (isNumeric(start) && isNumeric(end)) {
                const s = parseInt(start), e = parseInt(end), res = [], padLen = start.length;
                const min = Math.min(s, e), max = Math.max(s, e);
                for (let i = min; i <= max; i++) res.push(i.toString().padStart(padLen, '0'));
                return res;
            }
            if (start.length === end.length) {
                const strToNum = (str) => {
                    let num = 0;
                    for (let i = 0; i < str.length; i++) num = num * 26 + (str.toUpperCase().charCodeAt(i) - 64);
                    return num;
                };
                const numToStr = (num, length) => {
                    let str = "";
                    for (let i = 0; i < length; i++) {
                        str = String.fromCharCode(((num - 1) % 26) + 65) + str;
                        num = Math.floor((num - 1) / 26);
                    }
                    return str;
                };
                const sNum = strToNum(start), eNum = strToNum(end), res = [];
                const min = Math.min(sNum, eNum), max = Math.max(sNum, eNum);
                for (let i = min; i <= max; i++) res.push(numToStr(i, start.length));
                return res;
            }
            return [start, end];
        }

        function switchTab(type) {
            document.getElementById('tab-tree').className = type === 'tree' ? 'flex-1 py-4 text-sm font-bold tab-active bg-white' : 'flex-1 py-4 text-sm font-bold text-slate-400 hover:bg-white';
            document.getElementById('tab-raw').className = type === 'raw' ? 'flex-1 py-4 text-sm font-bold tab-active bg-white' : 'flex-1 py-4 text-sm font-bold text-slate-400 hover:bg-white';
            document.getElementById('view-tree').classList.toggle('hidden', type !== 'tree');
            document.getElementById('view-raw').classList.toggle('hidden', type !== 'raw');
        }

        function toggleAllFolders(expand) {
            const contents = document.querySelectorAll('.tree-content');
            const icons = document.querySelectorAll('.folder-icon');
            contents.forEach(c => c.classList.toggle('hidden', !expand));
            icons.forEach(i => i.style.transform = expand ? 'rotate(0deg)' : 'rotate(-90deg)');
        }

        function generateUrls() {
            const baseUrlTemplate = document.getElementById('baseUrl').value;
            const groups = document.querySelectorAll('.var-group');
            if (!baseUrlTemplate) { alert("기초 URL을 입력해주세요."); return; }

            const variables = [];
            const allRules = [];

            groups.forEach((group) => {
                const name = group.querySelector('.var-name').value.trim();
                const rawValues = group.querySelector('.var-values').value.trim();
                if (name && rawValues) {
                    variables.push({ name, key: `{${name}}`, values: parseRange(rawValues) });
                    const rules = group.querySelectorAll('.rule-row');
                    rules.forEach(r => {
                        const triggerVals = parseRange(r.querySelector('.rule-trigger-val').value.trim());
                        const targetVarName = r.querySelector('.rule-target-select').value;
                        const affectedVals = parseRange(r.querySelector('.rule-affected-vals').value.trim());
                        const type = r.querySelector('.rule-type').value;
                        if (triggerVals.length > 0 && targetVarName && affectedVals.length > 0) {
                            allRules.push({ parentVar: name, triggerVals, targetVar: targetVarName, affectedVals, type });
                        }
                    });
                }
            });

            if (variables.length === 0) { alert("변수와 데이터를 입력해주세요."); return; }

            const cartesian = (arrays) => arrays.reduce((a, b) => a.flatMap(d => b.map(e => [d, e].flat())));
            const valueArrays = variables.map(v => v.values);
            const rawCombinations = valueArrays.length > 1 ? cartesian(valueArrays) : valueArrays[0].map(v => [v]);

            const fullList = [];
            const root = { children: {} };

            rawCombinations.forEach(combo => {
                const comboArr = Array.isArray(combo) ? combo : [combo];
                const comboMap = {};
                variables.forEach((v, idx) => comboMap[v.name] = comboArr[idx]);

                let isValid = true;
                for (const rule of allRules) {
                    if (rule.triggerVals.includes(comboMap[rule.parentVar])) {
                        const isAffected = rule.affectedVals.includes(comboMap[rule.targetVar]);
                        if ((rule.type === 'exclude' && isAffected) || (rule.type === 'only' && !isAffected)) {
                            isValid = false; break;
                        }
                    }
                }

                if (isValid) {
                    let currentUrl = baseUrlTemplate;
                    let currentNode = root;
                    variables.forEach((v, idx) => {
                        const val = comboArr[idx];
                        const escapedKey = v.key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        currentUrl = currentUrl.replace(new RegExp(escapedKey, 'g'), val);
                        if (!currentNode.children[val]) {
                            currentNode.children[val] = { children: {}, isLeaf: idx === variables.length - 1 };
                        }
                        currentNode = currentNode.children[val];
                        if (currentNode.isLeaf) currentNode.url = currentUrl;
                    });
                    fullList.push(currentUrl);
                }
            });

            document.getElementById('emptyPlaceholder').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            document.getElementById('resultCount').textContent = fullList.length.toLocaleString();
            document.getElementById('resultOutput').value = fullList.join('\n');
            const treeContainer = document.getElementById('treeContainer');
            treeContainer.innerHTML = '';
            renderTree(root, treeContainer);
        }

        function renderTree(node, container) {
            const sortedKeys = Object.keys(node.children).sort();
            sortedKeys.forEach(key => {
                const child = node.children[key];
                const itemDiv = document.createElement('div');
                itemDiv.className = 'tree-item my-1';
                const header = document.createElement('div');
                header.className = 'flex items-center gap-2 py-1.5 folder-toggle text-sm transition-all rounded px-2 hover:bg-slate-50';
                
                if (child.isLeaf) {
                    const isAuto = document.getElementById('autoLoadImages').checked;
                    header.innerHTML = `
                        <div class="flex flex-col w-full gap-2 py-2">
                            <div class="flex items-center gap-2">
                                <svg class="h-4 w-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                <span class="text-indigo-600 truncate font-bold text-xs">${key}</span>
                                <button onclick="window.open('${child.url}', '_blank')" class="ml-auto text-[10px] font-bold text-slate-400 hover:text-indigo-600 px-2">원본보기</button>
                            </div>
                            <div class="preview-box ${isAuto ? '' : 'cursor-pointer'}" onclick="loadPreview(this, '${child.url}')">
                                ${isAuto ? `<img src="${child.url}" class="preview-image shadow-sm border border-slate-100" onerror="this.parentElement.innerHTML='<span class=\'text-[10px] text-red-400\'>로드 실패 (URL을 확인해주세요)</span>'">` 
                                         : `<div class="bg-slate-50 border border-dashed border-slate-200 rounded-lg py-3 text-center text-[10px] text-slate-400 font-bold hover:bg-indigo-50 hover:border-indigo-200">클릭하여 이미지 미리보기</div>`}
                            </div>
                        </div>
                    `;
                } else {
                    header.innerHTML = `
                        <svg class="folder-icon h-4 w-4 text-amber-400 transition-transform" style="transform: rotate(-90deg)" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
                        <span class="font-bold text-slate-700">${key}</span>
                        <span class="text-[10px] font-black text-indigo-400 bg-indigo-50 px-2 py-0.5 rounded-full ml-1">${Object.keys(child.children).length}</span>
                    `;
                    header.onclick = () => {
                        const content = itemDiv.querySelector('.tree-content');
                        const icon = header.querySelector('.folder-icon');
                        const isHidden = content.classList.toggle('hidden');
                        icon.style.transform = isHidden ? 'rotate(-90deg)' : 'rotate(0deg)';
                    };
                }
                itemDiv.appendChild(header);
                if (!child.isLeaf) {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'tree-content hidden';
                    renderTree(child, contentDiv);
                    itemDiv.appendChild(contentDiv);
                }
                container.appendChild(itemDiv);
            });
        }

        function loadPreview(container, url) {
            if (container.querySelector('img')) {
                // 이미 로드된 경우 큰 화면으로 보기
                document.getElementById('modalImg').src = url;
                document.getElementById('imageModal').classList.remove('hidden');
                return;
            }
            container.innerHTML = `<img src="${url}" class="preview-image shadow-sm border border-slate-100" onerror="this.parentElement.innerHTML='<span class=\'text-[10px] text-red-400\'>로드 실패</span>'">`;
            container.classList.remove('cursor-pointer');
        }

        function copyToClipboard() {
            const copyText = document.getElementById("resultOutput");
            copyText.select();
            document.execCommand("copy");
            const btn = document.querySelector('[onclick="copyToClipboard()"]');
            const originalText = btn.textContent;
            btn.textContent = "복사되었습니다!";
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 2000);
        }

        window.onload = () => { 
            addVariableField(); 
            addVariableField(); 
        };
    </script>
</body>
</html>
